    <p>　『<a href="https://cir.nii.ac.jp/crid/1520854805328598400">詩的リズム</a>』（<a href="https://ja.wikipedia.org/wiki/%E8%8F%85%E8%B0%B7%E8%A6%8F%E7%9F%A9%E9%9B%84">菅谷規矩雄</a>）読み終わる。<br>
　"続"は古本では高いが、図書館に行けばあるようだ。<br>
　日記用コマンド、folio（これ）つくりはじめる。いまのところただの Quartz。<br>
　マナガツオをとりだして焼く。これは他の地域の及びようのない、西の発明であると思う。<br>
　さすがに連載の小説を書きはじめる。６枚。<br>
　シナリオにおけるイベントをどう拾い、どうマークするのかの試み。感情曲線はやっぱり実作業の役には立たないなと思う。</p>
