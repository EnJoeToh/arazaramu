{% extends "base.html" %}
{% block title %}Archive - {{ site_title }}{% endblock %}
{% block content %}
  <section class="section">
    <h1>Archive</h1>
    <ol class="month-list">
      {% for month in months %}
        <li>
          <a href="{{ month }}.html">{{ month }}<span class="count">（{{ month_entries[month] | length }}）</span></a>
        </li>
      {% else %}
        <li>No entries yet.</li>
      {% endfor %}
    </ol>
  </section>

  <nav class="page-nav">
    <a href="index.html">Index</a>
  </nav>
{% endblock %}
