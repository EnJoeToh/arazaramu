<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_title }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ asset_prefix | default('') }}assets/style.css">
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ root_prefix | default('') }}index.html">{{ site_title }}</a>
      {% if subtitle %}
        <p class="site-subtitle">{{ subtitle }}</p>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
