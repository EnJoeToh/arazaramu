<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_title }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ asset_prefix | default('') }}assets/style.css">
    {% if site_url %}
      <link rel="alternate" type="application/rss+xml" title="{{ site_title }}" href="{{ root_prefix | default('') }}feed.xml">
    {% endif %}
  </head>
  <body>
    <header class="site-header">
      <div class="site-heading">
        <a class="site-title" href="{{ root_prefix | default('') }}index.html">{{ site_title }}</a>
        {% if subtitle %}
          <p class="site-subtitle">{{ subtitle }}</p>
        {% endif %}
      </div>
      {% if site_url %}
        <a class="feed-link" href="{{ root_prefix | default('') }}feed.xml">RSS</a>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
